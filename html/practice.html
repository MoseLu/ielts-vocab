<!-- Practice Page -->
<div class="practice-page" id="practicePage">
    <div class="practice-container">
        <!-- Previous Word (Top Left) -->
        <div class="previous-word" id="previousWord">
            <div class="previous-label">上一题</div>
            <div class="previous-word-text" id="prevWord"></div>
            <div class="previous-word-phonetic" id="prevPhonetic"></div>
            <div class="previous-word-pos" id="prevPos"></div>
            <div class="previous-word-definition" id="prevDefinition"></div>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-dot correct"></span>
                <span class="stat-value correct" id="correctCount">0</span>
                <span class="stat-label">正确</span>
            </div>
            <div class="stat-item">
                <span class="stat-dot wrong"></span>
                <span class="stat-value wrong" id="wrongCount">0</span>
                <span class="stat-label">错误</span>
            </div>
        </div>

        <!-- Play Button Area -->
        <div class="play-area" id="playArea">
            <button class="play-btn-large" id="playBtn">
                <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                    <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                </svg>
            </button>
            <div class="word-display" id="wordDisplay">
                <div class="current-word" id="currentWord">Loading...</div>
                <div class="word-phonetic" id="wordPhonetic"></div>
                <div class="word-pos" id="wordPos"></div>
            </div>
        </div>

        <!-- Options Grid (2x2) -->
        <div class="options-grid" id="optionsGrid">
            <!-- Options generated by JS -->
        </div>

        <!-- Skip Button -->
        <div class="skip-area">
            <button class="skip-btn" id="skipBtn">
                <span class="skip-text">不知道</span>
                <span class="skip-hotkey">快捷键: 5</span>
            </button>
        </div>

        <!-- Bottom Progress -->
        <div class="bottom-progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0/100</div>
        </div>
    </div>
</div>
