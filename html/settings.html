<!-- Settings Modal -->
<div class="settings-overlay" id="settingsOverlay">
    <div class="settings-modal">
        <div class="settings-header">
            <h2 class="settings-title">设置</h2>
            <button class="settings-close" id="settingsClose" title="关闭">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="settings-body">
            <!-- Sidebar Tabs -->
            <div class="settings-sidebar">
                <button class="settings-tab active" data-tab="answer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>答题</span>
                </button>
                <button class="settings-tab" data-tab="sound">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <span>声音</span>
                </button>
                <button class="settings-tab" data-tab="display">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <span>显示</span>
                </button>
                <button class="settings-tab" data-tab="review">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    <span>复习</span>
                </button>
            </div>

            <!-- Settings Content Panels -->
            <div class="settings-content">
                <!-- Answer Settings -->
                <div class="settings-panel active" id="panel-answer">
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">错词循环</div>
                            <div class="settings-item-desc">答错的单词将在本轮中循环出现</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="setting-repeat-wrong" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">答错显示答案</div>
                            <div class="settings-item-desc">答错后显示正确答案供参考</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="setting-show-answer">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">随机顺序</div>
                            <div class="settings-item-desc">随机打乱单词学习顺序</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="setting-shuffle" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">自动提交</div>
                            <div class="settings-item-desc">拼写模式下输入完成自动提交</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="setting-auto-submit">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">错误本</div>
                            <div class="settings-item-desc">记录答错单词到错误本</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="setting-error-book" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Sound Settings -->
                <div class="settings-panel" id="panel-sound">
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">语音选择</div>
                            <div class="settings-item-desc">选择单词发音口音</div>
                        </div>
                        <select class="settings-select" id="setting-voice">
                            <option value="default">默认</option>
                            <option value="uk">英式发音</option>
                            <option value="us">美式发音</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">播放次数</div>
                            <div class="settings-item-desc">每个单词的发音播放次数</div>
                        </div>
                        <select class="settings-select" id="setting-playback-count">
                            <option value="1">1次</option>
                            <option value="2" selected>2次</option>
                            <option value="3">3次</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">播放速度</div>
                            <div class="settings-item-desc">发音播放的语速快慢</div>
                        </div>
                        <select class="settings-select" id="setting-playback-speed">
                            <option value="0.7">慢速 0.7x</option>
                            <option value="1.0" selected>正常 1.0x</option>
                            <option value="1.2">快速 1.2x</option>
                            <option value="1.5">极速 1.5x</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">音量</div>
                            <div class="settings-item-desc">发音播放音量大小</div>
                        </div>
                        <select class="settings-select" id="setting-volume">
                            <option value="40">低</option>
                            <option value="70">中</option>
                            <option value="100" selected>高</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">播放间隔</div>
                            <div class="settings-item-desc">连续播放时每词间隔秒数</div>
                        </div>
                        <select class="settings-select" id="setting-interval">
                            <option value="1">1秒</option>
                            <option value="2" selected>2秒</option>
                            <option value="3">3秒</option>
                            <option value="5">5秒</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">连续播放模式</div>
                            <div class="settings-item-desc">自动依次播放每个单词</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="setting-dictation-mode">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Display Settings -->
                <div class="settings-panel" id="panel-display">
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">深色模式</div>
                            <div class="settings-item-desc">切换深色/浅色主题</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="darkMode">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">字体大小</div>
                            <div class="settings-item-desc">调整界面显示字体大小</div>
                        </div>
                        <select class="settings-select" id="setting-font-size">
                            <option value="small">小</option>
                            <option value="medium" selected>中</option>
                            <option value="large">大</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">显示音标</div>
                            <div class="settings-item-desc">在单词下方显示国际音标</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="setting-show-phonetic" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">显示词性</div>
                            <div class="settings-item-desc">显示单词的词性标签</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="setting-show-pos" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Review Settings -->
                <div class="settings-panel" id="panel-review">
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">复习间隔</div>
                            <div class="settings-item-desc">艾宾浩斯遗忘曲线复习间隔天数</div>
                        </div>
                        <select class="settings-select" id="setting-review-interval">
                            <option value="1" selected>1天</option>
                            <option value="3">3天</option>
                            <option value="7">7天</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-info">
                            <div class="settings-item-title">复习数量</div>
                            <div class="settings-item-desc">每次复习的单词数量上限</div>
                        </div>
                        <select class="settings-select" id="setting-review-limit">
                            <option value="10">10个</option>
                            <option value="20" selected>20个</option>
                            <option value="50">50个</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
