<!-- Complete Screen -->
<div class="complete-screen" id="completeScreen">
    <div class="complete-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
        </svg>
    </div>
    <h2 class="complete-title">太棒了！</h2>
    <p class="complete-subtitle">Day <span id="completedDay"></span> 已完成</p>

    <div class="complete-stats">
        <div class="complete-stat">
            <div class="complete-stat-value" id="finalCorrect">0</div>
            <div class="complete-stat-label">正确</div>
        </div>
        <div class="complete-stat">
            <div class="complete-stat-value" id="finalWrong">0</div>
            <div class="complete-stat-label">错误</div>
        </div>
    </div>

    <div class="practice-controls">
        <button class="control-btn" id="backHomeBtn">返回首页</button>
        <button class="control-btn" id="nextDayBtn">下一 Day</button>
    </div>
</div>
