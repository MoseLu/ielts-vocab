<!-- Auth Page -->
<div class="auth-page" id="authPage">
    <div class="auth-card">
        <h1 class="auth-title" id="authTitle">登录</h1>
        <p class="auth-subtitle" id="authSubtitle">登录后自动同步学习进度</p>

        <!-- Username (for registration) -->
        <div id="usernameField" style="display: none;">
            <input type="text" class="auth-input" id="usernameInput" placeholder="用户名（至少3个字符）">
        </div>

        <input type="email" class="auth-input" id="emailInput" placeholder="邮箱地址">
        <input type="password" class="auth-input" id="passwordInput" placeholder="密码（至少6位）">

        <!-- Confirm password (for registration) -->
        <div id="confirmPasswordField" style="display: none;">
            <input type="password" class="auth-input" id="confirmPasswordInput" placeholder="确认密码">
        </div>

        <button class="auth-btn" id="authBtn">登录</button>
        <button class="auth-btn secondary" id="switchAuthBtn">注册账号</button>

        <!-- Agreement Checkbox -->
        <label class="agreement-label" for="agreement">
            <input type="checkbox" id="agreement" class="agreement-checkbox">
            <span class="agreement-text">我已阅读并同意</span>
            <a href="#" class="agreement-link" id="agreementLink">《用户服务协议》</a>
        </label>
    </div>
</div>
