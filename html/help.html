<!-- Help Modal -->
<div class="settings-overlay" id="helpOverlay">
    <div class="settings-modal" style="max-width: 480px;">
        <div class="settings-header">
            <h2 class="settings-title">帮助</h2>
            <button class="settings-close" id="helpClose" title="关闭">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="settings-content" style="padding: 24px;">
            <div style="margin-bottom: 24px;">
                <h3 style="font-size:14px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">键盘快捷键</h3>
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <kbd style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px;font-weight:600;color:var(--text-primary);">1 - 4</kbd>
                        <span style="font-size:14px;color:var(--text-secondary);">选择答案选项</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <kbd style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px;font-weight:600;color:var(--text-primary);">5</kbd>
                        <span style="font-size:14px;color:var(--text-secondary);">不知道（跳过）</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <kbd style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px;font-weight:600;color:var(--text-primary);">空格</kbd>
                        <span style="font-size:14px;color:var(--text-secondary);">重新播放发音</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <kbd style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px;font-weight:600;color:var(--text-primary);">Esc</kbd>
                        <span style="font-size:14px;color:var(--text-secondary);">退出练习</span>
                    </div>
                </div>
            </div>
            <div>
                <h3 style="font-size:14px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">学习模式</h3>
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <div style="font-size:14px;color:var(--text-secondary);"><strong style="color:var(--text-primary);">智能模式</strong> — 根据水平自动调整练习方式</div>
                    <div style="font-size:14px;color:var(--text-secondary);"><strong style="color:var(--text-primary);">听写模式</strong> — 听发音后拼写单词</div>
                    <div style="font-size:14px;color:var(--text-secondary);"><strong style="color:var(--text-primary);">听音选义</strong> — 听发音选择中文释义</div>
                    <div style="font-size:14px;color:var(--text-secondary);"><strong style="color:var(--text-primary);">随身听</strong> — 连续播放单词音频</div>
                    <div style="font-size:14px;color:var(--text-secondary);"><strong style="color:var(--text-primary);">默写模式</strong> — 看中文释义写出英文</div>
                </div>
            </div>
        </div>
    </div>
</div>
