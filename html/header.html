<!-- Header -->
<header class="header">
    <!-- Left: Logo + Brand -->
    <div class="header-left">
        <div class="logo">
            <img src="assets/images/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">雅思冲刺</span>
        </div>
    </div>

    <!-- Center: Empty or other content -->
    <div class="header-center">
        <!-- Day selector moved to header-right -->
    </div>

    <!-- Right: Day Selector + Mode + Actions -->
    <div class="header-right">
        <!-- Day Selector (hidden when not logged in) -->
        <div class="day-selector-wrapper auth-only hidden" id="daySelectorWrapper">
            <div class="day-selector" id="daySelector">
                <span class="day-selector-current" id="daySelectorCurrent">超核心词汇 Day 1</span>
                <svg class="day-selector-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
            <!-- Day Dropdown Menu -->
            <div class="day-dropdown hidden" id="dayDropdown">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- Progress Indicator -->
        <span class="progress-indicator" id="progressIndicator"></span>

        <!-- Mode Selector Button (hidden when not logged in) -->
        <button class="header-btn auth-only hidden" id="modeBtn" title="切换模式">
            <span id="modeText">听音选义</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 4px;">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </button>

        <!-- Mode Dropdown Menu -->
        <div class="mode-dropdown hidden" id="modeDropdown">
            <div class="mode-dropdown-item" data-mode="smart">
                <span class="mode-item-text">智能模式</span>
                <svg class="mode-check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <div class="mode-dropdown-item" data-mode="dictation">
                <span class="mode-item-text">听写模式</span>
                <svg class="mode-check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <div class="mode-dropdown-item active" data-mode="listening">
                <span class="mode-item-text">听音选义</span>
                <svg class="mode-check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <div class="mode-dropdown-item" data-mode="radio">
                <span class="mode-item-text">随身听</span>
                <svg class="mode-check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <div class="mode-dropdown-item" data-mode="blind">
                <span class="mode-item-text">默写模式</span>
                <svg class="mode-check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
        </div>

        <!-- Settings Button (hidden when not logged in) -->
        <button class="header-btn auth-only hidden" id="settingsBtn" title="设置">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>

        <!-- Help Button -->
        <button class="header-btn" id="helpBtn" title="帮助">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.66 0 2.48 2.48 0 0 1-.6 1.85c-.55.6-1.26 1.08-1.9 1.63-.6.52-.96 1.25-.96 2.07V15"></path>
                <circle cx="12" cy="18.5" r="0.8" fill="currentColor" stroke="none"></circle>
            </svg>
        </button>

        <!-- Home Button -->
        <button class="header-btn" id="homeBtn" title="主页">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </button>

        <!-- User Menu (hidden when not logged in) -->
        <div class="user-menu auth-only hidden" id="userMenu">
            <button class="user-btn" id="userBtn">
                <span id="userInitial">?</span>
            </button>
            <div class="user-dropdown" id="userDropdown">
                <button class="dropdown-item" id="logoutBtn">退出登录</button>
            </div>
        </div>
    </div>
</header>
