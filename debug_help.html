<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊断 Help 按钮</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="padding: 20px; font-family: sans-serif;">
    <h1>Help 按钮诊断</h1>

    <h2>1. 测试元素是否存在</h2>
    <div id="test1">检测中...</div>

    <h2>2. 测试事件监听器</h2>
    <button id="testHelpBtn" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
        点击测试 Help 按钮
    </button>
    <div id="test2" style="margin-top: 10px;">等待测试...</div>

    <h2>3. 模块加载状态</h2>
    <div id="test3">检测中...</div>

    <hr style="margin: 20px 0;">
    <h2>实际页面元素</h2>

    <!-- 实际的容器 -->
    <div id="header-container"></div>
    <div id="help-container"></div>

    <script type="module">
        import '/js/modules.js';

        // 等待模块加载
        window.addEventListener('modulesLoaded', async () => {
            console.log('✅ Modules loaded event fired');
            document.getElementById('test3').innerHTML = '✅ 模块已加载';

            // 等待一小段时间确保 DOM 已更新
            await new Promise(resolve => setTimeout(resolve, 100));

            // 检查元素
            const helpBtn = document.getElementById('helpBtn');
            const helpOverlay = document.getElementById('helpOverlay');
            const helpClose = document.getElementById('helpClose');

            let html = '<ul>';
            html += `<li>helpBtn: ${helpBtn ? '✅ 存在' : '❌ 不存在'}</li>`;
            html += `<li>helpOverlay: ${helpOverlay ? '✅ 存在' : '❌ 不存在'}</li>`;
            html += `<li>helpClose: ${helpClose ? '✅ 存在' : '❌ 不存在'}</li>`;
            html += '</ul>';
            document.getElementById('test1').innerHTML = html;

            // 设置测试按钮
            const testBtn = document.getElementById('testHelpBtn');
            testBtn.addEventListener('click', () => {
                console.log('Test button clicked');

                if (!helpOverlay) {
                    document.getElementById('test2').innerHTML = '❌ helpOverlay 不存在，无法打开';
                    return;
                }

                // 测试打开
                helpOverlay.classList.add('show');
                document.getElementById('test2').innerHTML = '✅ 已添加 show 类，检查是否显示';

                // 检查样式
                const styles = window.getComputedStyle(helpOverlay);
                console.log('helpOverlay styles:', {
                    display: styles.display,
                    opacity: styles.opacity,
                    visibility: styles.visibility
                });

                setTimeout(() => {
                    const styles = window.getComputedStyle(helpOverlay);
                    document.getElementById('test2').innerHTML += `<br>Computed styles: display=${styles.display}, opacity=${styles.opacity}, visibility=${styles.visibility}`;
                }, 100);
            });

            // 设置实际的help按钮事件
            if (helpBtn) {
                helpBtn.addEventListener('click', () => {
                    console.log('Actual helpBtn clicked');
                    if (helpOverlay) {
                        helpOverlay.classList.add('show');
                    }
                });
                console.log('✅ Help button listener attached');
            }

            if (helpClose) {
                helpClose.addEventListener('click', () => {
                    if (helpOverlay) {
                        helpOverlay.classList.remove('show');
                    }
                });
                console.log('✅ Help close listener attached');
            }

            if (helpOverlay) {
                helpOverlay.addEventListener('click', (e) => {
                    if (e.target === helpOverlay) {
                        helpOverlay.classList.remove('show');
                    }
                });
                console.log('✅ Help overlay listener attached');
            }
        });

        // 超时检测
        setTimeout(() => {
            if (!window.modulesInitialized) {
                document.getElementById('test3').innerHTML = '⚠️ 3秒后仍未收到 modulesLoaded 事件';
            }
        }, 3000);
    </script>
</body>
</html>
