[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "platform-sdk"
version = "0.1.0"
description = "Shared platform helpers for the IELTS Vocabulary microservice transition."
requires-python = ">=3.10"
dependencies = [
  "oss2>=2.18.0",
]

[tool.setuptools.packages.find]
include = ["platform_sdk*"]
