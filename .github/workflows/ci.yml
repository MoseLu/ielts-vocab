name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run file line guardrail
        run: pnpm check:file-lines

      - name: Run frontend lint
        run: pnpm lint

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-please-change-in-real-env
      JWT_SECRET_KEY: ci-jwt-secret-key-please-change-in-real-env
      ADMIN_INITIAL_PASSWORD: ci-admin-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r backend/requirements.txt -r services/requirements.txt
          python -m pip install -e packages/platform-sdk

      - name: Run backend tests
        run: pytest backend/tests -q
