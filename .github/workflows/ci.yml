name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run docs guard
        run: pnpm check:docs

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run file line guardrail
        run: pnpm check:file-lines

      - name: Run frontend lint
        run: pnpm lint

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

  frontend-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend coverage baseline
        id: frontend_coverage
        continue-on-error: true
        run: pnpm test:coverage

      - name: Report frontend coverage baseline
        if: steps.frontend_coverage.outcome == 'failure'
        run: echo "::warning::Frontend line coverage is below the initial 55% baseline. Reporting only during this stabilization phase."

  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-please-change-in-real-env
      JWT_SECRET_KEY: ci-jwt-secret-key-please-change-in-real-env
      ADMIN_INITIAL_PASSWORD: ci-admin-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r backend/requirements.lock.txt -r services/requirements.lock.txt
          python -m pip install -e packages/platform-sdk

      - name: Run backend tests
        run: pytest backend/tests -q

  backend-coverage:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-please-change-in-real-env
      JWT_SECRET_KEY: ci-jwt-secret-key-please-change-in-real-env
      ADMIN_INITIAL_PASSWORD: ci-admin-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov
          python -m pip install -r backend/requirements.lock.txt -r services/requirements.lock.txt
          python -m pip install -e packages/platform-sdk

      - name: Run backend coverage baseline
        id: backend_coverage
        continue-on-error: true
        run: pytest backend/tests --cov=backend --cov-report=term-missing --cov-fail-under=65 -q

      - name: Report backend coverage baseline
        if: steps.backend_coverage.outcome == 'failure'
        run: echo "::warning::Backend line coverage is below the initial 65% baseline. Reporting only during this stabilization phase."

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit Python production dependencies
        id: python_audit
        continue-on-error: true
        run: |
          pip-audit -r backend/requirements.lock.txt
          pip-audit -r services/requirements.lock.txt

      - name: Report Python dependency audit
        if: steps.python_audit.outcome == 'failure'
        run: echo "::warning::pip-audit reported Python dependency findings. Review before release closeout."

      - name: Audit frontend production dependencies
        id: frontend_audit
        continue-on-error: true
        run: pnpm --dir frontend audit --prod

      - name: Report frontend dependency audit
        if: steps.frontend_audit.outcome == 'failure'
        run: echo "::warning::pnpm audit reported frontend production dependency findings. Review before release closeout."

  windows-split-runtime-smoke:
    runs-on: windows-latest
    env:
      SECRET_KEY: ci-secret-key-please-change-in-real-env
      JWT_SECRET_KEY: ci-jwt-secret-key-please-change-in-real-env
      ADMIN_INITIAL_PASSWORD: ci-admin-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.lock.txt -r services/requirements.lock.txt
          python -m pip install -e packages/platform-sdk

      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install chromium

      - name: Run Windows split runtime smoke
        shell: pwsh
        run: .\scripts\ci\windows-split-runtime-smoke.ps1 -ProjectRoot $PWD
