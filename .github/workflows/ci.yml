name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-please-change-in-real-env
      JWT_SECRET_KEY: ci-jwt-secret-key-please-change-in-real-env
      ADMIN_INITIAL_PASSWORD: ci-admin-password
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend/tests -q
