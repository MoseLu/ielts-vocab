name: Axi Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version without v
        required: true
      level:
        description: major, minor, or patch
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      release_notes:
        description: Release notes for the GitHub Release
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Tag and GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: version
        uses: actions/github-script@v7
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_LEVEL: ${{ inputs.level }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        with:
          script: |
            const fs = require('fs');

            const bodyCandidates = [];
            const directInputs = [
              process.env.INPUT_VERSION ? 'Release-Version: ' + process.env.INPUT_VERSION : '',
              process.env.INPUT_LEVEL ? 'Release-Level: ' + process.env.INPUT_LEVEL : '',
              process.env.INPUT_RELEASE_NOTES ? 'Release-Notes:\n' + process.env.INPUT_RELEASE_NOTES : ''
            ].filter(Boolean).join('\n');
            if (directInputs) bodyCandidates.push(directInputs);

            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });
            if (commit.data.commit && commit.data.commit.message) {
              bodyCandidates.push(commit.data.commit.message);
            }

            if (context.eventName !== 'workflow_dispatch') {
              const associated = await github.request('GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                headers: { accept: 'application/vnd.github+json' }
              });
              const releasePr = associated.data.find((pull) => pull.base && pull.base.ref === 'main') || associated.data[0];
              if (releasePr && releasePr.body) bodyCandidates.unshift(releasePr.body);
            }

            const readLine = (text, name) => {
              const regex = new RegExp('^' + name + ':[ \\t]*(.+)$', 'im');
              const match = text.match(regex);
              return match ? match[1].trim() : '';
            };
            const readBlock = (text, name) => {
              const regex = new RegExp('^' + name + ':[ \\t]*(?:\\n)?([\\s\\S]*?)(?=\\n[A-Za-z][A-Za-z-]+:[ \\t]*|$)', 'im');
              const match = text.match(regex);
              return match ? match[1].trim() : '';
            };
            const first = (reader, name) => {
              for (const candidate of bodyCandidates) {
                const value = reader(candidate, name);
                if (value) return value;
              }
              return '';
            };

            const version = process.env.INPUT_VERSION || first(readLine, 'Release-Version');
            const level = process.env.INPUT_LEVEL || first(readLine, 'Release-Level');
            const notes = process.env.INPUT_RELEASE_NOTES || first(readBlock, 'Release-Notes');
            const rollback = first(readBlock, 'Rollback');

            if (!/^[0-9]+\.[0-9]+\.[0-9]+$/.test(version)) {
              core.setFailed('Release-Version: X.Y.Z is required for main releases');
              return;
            }
            if (!/^(major|minor|patch)$/.test(level)) {
              core.setFailed('Release-Level: major|minor|patch is required');
              return;
            }
            if (!notes) {
              core.setFailed('Release-Notes is required for main releases');
              return;
            }
            if (!rollback && context.eventName !== 'workflow_dispatch') {
              core.setFailed('Rollback guidance is required for main releases');
              return;
            }

            const releaseNotes = [
              'Release level: ' + level,
              '',
              notes,
              '',
              'Rollback:',
              rollback || 'Manual workflow_dispatch release; use the corresponding operator rollback plan.'
            ].join('\n');
            fs.writeFileSync('release-notes.md', releaseNotes + '\n');
            core.setOutput('version', version);
            core.setOutput('level', level);
            core.setOutput('tag', 'ielts-vocab/v' + version);

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          LEVEL: ${{ steps.version.outputs.level }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git tag -a "$TAG" -m "ielts-vocab v$VERSION ($LEVEL)"
            git push origin "$TAG"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
          else
            gh release create "$TAG" --title "ielts-vocab v$VERSION" --notes-file release-notes.md
          fi
