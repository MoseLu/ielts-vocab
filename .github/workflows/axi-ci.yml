name: Axi CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
      - 'feature/**'
      - 'debug/**'
      - 'hotfix/**'
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: axi-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Baseline
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run package checks
        run: |
          run_if_script() {
            local script_name="$1"
            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts[process.argv[1]] ? 0 : 1)" "$script_name"; then
              pnpm "$script_name"
            else
              echo "skip missing script: $script_name"
            fi
          }
          run_if_script check:file-lines
          run_if_script lint
          run_if_script test
          run_if_script build

      - name: Python smoke
        working-directory: .
        run: |
          python3 --version
          if [ -f requirements.txt ]; then python3 -m pip install -r requirements.txt; fi
          if [ -d tests ]; then python3 -m pytest -q tests; else echo "skip missing python tests"; fi




      - name: Tracked secret filename guard
        working-directory: .
        run: |
          if git ls-files | grep -Ei '(^|/)(\.env$|.*private[_-]?key.*|.*service-account.*\.json$|.*credential.*\.json$)'; then
            echo "Tracked secret-like filename found."
            exit 1
          fi
