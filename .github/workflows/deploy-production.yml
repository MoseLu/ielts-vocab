name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: Commit SHA, branch, or tag to deploy
        required: false
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      git_ref: ${{ steps.resolve.outputs.git_ref }}
    steps:
      - name: Resolve deployment ref
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.git_ref }}" ]]; then
            echo "git_ref=${{ inputs.git_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "git_ref=main" >> "$GITHUB_OUTPUT"
          fi

  test-gate:
    needs: resolve-ref
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SECRET_KEY: deploy-test-secret-key
      JWT_SECRET_KEY: deploy-test-jwt-secret-key
      ADMIN_INITIAL_PASSWORD: deploy-test-admin-password
    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.git_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r backend/requirements.lock.txt -r services/requirements.lock.txt
          python -m pip install -e packages/platform-sdk

      - name: Run frontend release-risk tests
        run: |
          pnpm --dir frontend verify:repo-guards
          pnpm --dir frontend exec vitest run \
            src/components/errors/page/ErrorsPage.test.tsx \
            src/components/errors/page/ErrorsPage.selection.test.tsx \
            src/components/errors/page/ErrorsPage.customBook.test.tsx \
            src/components/practice/PracticePage.errorMode.test.tsx \
            src/components/practice/PracticePage.quickmemoryReview.test.tsx \
            src/components/practice/PracticePage.quickmemoryReview.pagination.test.tsx \
            src/components/practice/PracticePage.quickmemoryResume.test.tsx \
            src/components/practice/PracticePage.listeningOptions.test.tsx \
            src/components/practice/PracticePage.dictationRetry.test.tsx \
            src/components/practice/PracticePage.radioProgress.test.tsx \
            src/components/practice/FollowMode.test.tsx \
            src/components/practice/page/PracticePronunciationButton.test.tsx \
            src/components/exams/page/ExamsLibraryPage.test.tsx

      - name: Run backend release-risk API tests
        run: |
          pytest \
            backend/tests/test_wrong_words_route.py \
            backend/tests/test_ai_quick_memory_review.py \
            backend/tests/test_learning_stats.py \
            backend/tests/test_stats_api_contract.py \
            backend/tests/test_release_risk_user_journey.py \
            backend/tests/test_progress_route.py \
            backend/tests/test_books_progress_resume.py \
            backend/tests/test_ai_speaking_assessment_application.py \
            backend/tests/test_ai_execution_follow_read_fallback.py \
            backend/tests/test_admin_exam_service_api.py \
            backend/tests/test_gateway_bff_exam_proxy.py \
            -q

  deploy:
    needs:
      - resolve-ref
      - test-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
      url: https://axiomaticworld.com
    permissions:
      contents: read
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.git_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build release artifact
        shell: bash
        env:
          FRONTEND_ASSET_BASE_URL: ${{ vars.FRONTEND_ASSET_BASE_URL }}
          VITE_ASSET_BASE_URL: ${{ vars.VITE_ASSET_BASE_URL }}
          FRONTEND_ASSET_OSS_ENABLED: ${{ vars.FRONTEND_ASSET_OSS_ENABLED }}
          FRONTEND_ASSET_OSS_PUBLIC_BASE_URL: ${{ vars.FRONTEND_ASSET_OSS_PUBLIC_BASE_URL }}
          FRONTEND_ASSET_OSS_PREFIX: ${{ vars.FRONTEND_ASSET_OSS_PREFIX }}
          FRONTEND_ASSET_OSS_CORS_ORIGINS: ${{ vars.FRONTEND_ASSET_OSS_CORS_ORIGINS }}
          FRONTEND_ASSET_OSS_CONNECT_TIMEOUT_SECONDS: ${{ vars.FRONTEND_ASSET_OSS_CONNECT_TIMEOUT_SECONDS }}
          FRONTEND_ASSET_OSS_UPLOAD_RETRY_ATTEMPTS: ${{ vars.FRONTEND_ASSET_OSS_UPLOAD_RETRY_ATTEMPTS }}
          AXI_ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.AXI_ALIYUN_OSS_ACCESS_KEY_ID }}
          AXI_ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.AXI_ALIYUN_OSS_ACCESS_KEY_SECRET }}
          AXI_ALIYUN_OSS_PUBLIC_BUCKET: ${{ secrets.AXI_ALIYUN_OSS_PUBLIC_BUCKET }}
          AXI_ALIYUN_OSS_REGION: ${{ secrets.AXI_ALIYUN_OSS_REGION }}
          AXI_ALIYUN_OSS_ENDPOINT: ${{ secrets.AXI_ALIYUN_OSS_ENDPOINT }}
          AXI_ALIYUN_OSS_STS_TOKEN: ${{ secrets.AXI_ALIYUN_OSS_STS_TOKEN }}
        run: |
          corepack enable
          python3 -m pip install python-dotenv -e packages/platform-sdk
          artifact_path="${RUNNER_TEMP}/ielts-vocab-release.tgz"
          bash scripts/cloud-deploy/build-release-artifact.sh HEAD "${artifact_path}"
          echo "ARTIFACT_PATH=${artifact_path}" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=$(git rev-parse --verify HEAD)" >> "$GITHUB_ENV"

      - name: Configure SSH access
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${PROD_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${PROD_SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deployment scripts
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          remote_tmp="/tmp/ielts-vocab-deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          ssh "${PROD_SSH_USER}@${PROD_SSH_HOST}" "rm -rf '${remote_tmp}' && mkdir -p '${remote_tmp}'"
          artifact_upload_started="$(date +%s)"
          artifact_size="$(du -h "${ARTIFACT_PATH}" | awk '{print $1}')"
          echo "Uploading release artifact (${artifact_size}) with rsync --partial --progress"
          artifact_uploaded=false
          for attempt in 1 2 3; do
            echo "Release artifact upload attempt ${attempt}/3"
            if timeout --signal=TERM --kill-after=15s 90s \
              rsync --partial --progress --timeout=60 "${ARTIFACT_PATH}" \
              "${PROD_SSH_USER}@${PROD_SSH_HOST}:${remote_tmp}/ielts-vocab-release.tgz"; then
              artifact_uploaded=true
              break
            fi
            if [[ "${attempt}" -lt 3 ]]; then
              echo "Release artifact upload stalled; retrying in 5s"
              sleep 5
            fi
          done
          if [[ "${artifact_uploaded}" != true ]]; then
            echo "::error::Release artifact upload failed after 3 attempts"
            exit 1
          fi
          artifact_upload_elapsed="$(( $(date +%s) - artifact_upload_started ))"
          echo "Release artifact upload finished in ${artifact_upload_elapsed}s"
          scp \
            scripts/validate_speaking_band_thresholds.py \
            scripts/cloud-deploy/build-release-artifact.sh \
            scripts/cloud-deploy/deploy-release-artifact.sh \
            scripts/cloud-deploy/deploy-release.sh \
            scripts/cloud-deploy/health-watchdog.sh \
            scripts/cloud-deploy/http-slot-common.sh \
            scripts/cloud-deploy/ielts-health-watchdog.service \
            scripts/cloud-deploy/ielts-health-watchdog.timer \
            scripts/cloud-deploy/preflight-check.sh \
            scripts/cloud-deploy/release-common.sh \
            scripts/cloud-deploy/rollback-release.sh \
            scripts/cloud-deploy/smoke-check.sh \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}:${remote_tmp}/"
          echo "REMOTE_TMP=${remote_tmp}" >> "$GITHUB_ENV"

      - name: Run remote preflight
        shell: bash
        env:
          GIT_REF: ${{ needs.resolve-ref.outputs.git_ref }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_APP_HOME: ${{ vars.PROD_APP_HOME }}
        run: |
          app_home="${PROD_APP_HOME:-/opt/ielts-vocab}"
          remote_cmd="set -euo pipefail; run_privileged(){ if [[ \"\${EUID}\" -eq 0 ]]; then \"\$@\"; else sudo -n \"\$@\"; fi; }; run_privileged chmod +x '${REMOTE_TMP}'/*.sh; run_privileged env APP_HOME='${app_home}' bash '${REMOTE_TMP}/preflight-check.sh' '${GIT_REF}'"
          ssh "${PROD_SSH_USER}@${PROD_SSH_HOST}" "${remote_cmd}"

      - name: Run production deployment
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_APP_HOME: ${{ vars.PROD_APP_HOME }}
          PROD_SMOKE_HOST: ${{ vars.PROD_SMOKE_HOST }}
        run: |
          app_home="${PROD_APP_HOME:-/opt/ielts-vocab}"
          smoke_host="${PROD_SMOKE_HOST:-axiomaticworld.com}"
          remote_cmd="set -euo pipefail; run_privileged(){ if [[ \"\${EUID}\" -eq 0 ]]; then \"\$@\"; else sudo -n \"\$@\"; fi; }; cleanup(){ run_privileged rm -rf '${REMOTE_TMP}'; }; trap cleanup EXIT; run_privileged chmod +x '${REMOTE_TMP}'/*.sh; run_privileged env APP_HOME='${app_home}' SMOKE_HOST='${smoke_host}' bash '${REMOTE_TMP}/deploy-release-artifact.sh' '${REMOTE_TMP}/ielts-vocab-release.tgz' '${COMMIT_SHA}'"
          ssh "${PROD_SSH_USER}@${PROD_SSH_HOST}" "${remote_cmd}"
