name: Axi PR Metadata

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  policy:
    name: Branch and release policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch policy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          case "$HEAD_REF" in
            feature/*|debug/*|hotfix/*|release/*|dependabot/*) ;;
            *) echo "Head branch must use feature/*, debug/*, hotfix/*, release/*, or dependabot/*"; exit 1 ;;
          esac
          if [ "$BASE_REF" = "main" ]; then
            case "$HEAD_REF" in
              release/*|hotfix/*) ;;
              *) echo "Only release/* or hotfix/* may target main"; exit 1 ;;
            esac
            printf '%s\n' "$PR_BODY" | grep -Eiq 'Release-Version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+' || {
              echo "PRs to main must include Release-Version: X.Y.Z"
              exit 1
            }
            printf '%s\n' "$PR_BODY" | grep -Eiq 'Release-Level:[[:space:]]*(major|minor|patch)' || {
              echo "PRs to main must include Release-Level: major|minor|patch"
              exit 1
            }
            printf '%s\n' "$PR_BODY" | grep -Eiq 'Release-Notes:' || {
              echo "PRs to main must include Release-Notes"
              exit 1
            }
            printf '%s\n' "$PR_BODY" | grep -Eiq 'Rollback:' || {
              echo "PRs to main must include Rollback guidance"
              exit 1
            }
          elif [ "$BASE_REF" != "dev" ]; then
            echo "PR base must be dev or main"
            exit 1
          fi

      - name: Label PR size
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const total = additions + deletions;
            const label = total <= 100 ? 'size/XS' : total <= 300 ? 'size/S' : total <= 500 ? 'size/M' : total <= 1000 ? 'size/L' : 'size/XL';
            try {
              await github.rest.issues.createLabel({ ...context.repo, name: label, color: 'ededed' });
            } catch (error) {
              if (error.status !== 422) throw error;
            }
            await github.rest.issues.addLabels({ ...context.repo, issue_number: pr.number, labels: [label] });
